<div class="auth-container">
  <div class="auth-card">
    <div class="vault-logo">
      <span class="lock-icon">🔒</span>
    </div>
    <h2>Access Vault</h2>
    <p class="subtitle">Enter your credentials to decrypt your data.</p>

    <div class="input-group">
      <label for="username">Username</label>
      <input id="username" [(ngModel)]="username" type="text" placeholder="e.g. zakaria_v2">
    </div>

    <div class="input-group">
      <label for="password">Master Password</label>
      <input id="password" [(ngModel)]="password" type="password" placeholder="••••••••••••">
    </div>

    <button class="primary-btn" (click)="onLogin()">Unlock Vault</button>

    <div class="auth-footer">
      <p>Don't have a vault yet? <a href="/register">Create one here</a></p>
    </div>
  </div>
</div>
